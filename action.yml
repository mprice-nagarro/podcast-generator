name: "Podcast Generator"
author: "Matt Price"
description: "Generates a feed for a podscast from a YAML file"
runs:
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email:
    description: "The committers email address"
    required: true
    default: ${{ github.actor }}@localhost
  name:
    description: "The committers name"
    required: true
    default: ${{ github.actor }}
